name: lethebot-local-acceptance

services:
  snowluma:
    image: lethebot/snowluma-local-acceptance:latest
    build:
      context: ../SnowLuma
      dockerfile: ../LetheBot/docker/local-acceptance/snowluma.Dockerfile
    entrypoint: ["sh", "/usr/local/bin/snowluma-entrypoint.sh"]
    command: ["node", "dist/index.mjs"]
    environment:
      ONEBOT_TOKEN: "${ONEBOT_TOKEN:-lethebot-local-token}"
      SNOWLUMA_ACCEPTANCE_OVERWRITE_ONEBOT_CONFIG: "${SNOWLUMA_ACCEPTANCE_OVERWRITE_ONEBOT_CONFIG:-0}"
      SNOWLUMA_WEBUI_BOOTSTRAP_PASSWORD: "${SNOWLUMA_WEBUI_BOOTSTRAP_PASSWORD:-lethebot-local}"
      SNOWLUMA_WEBUI_HOST: "0.0.0.0"
      SNOWLUMA_WEBUI_PORT: "5099"
      SNOWLUMA_WEBUI_TRUST_PROXY: "0"
      SNOWLUMA_LOG_DIR: "/snowluma/logs"
      SNOWLUMA_LOG_FILE: "1"
      SNOWLUMA_HOOK_AUTOLOAD: "${SNOWLUMA_HOOK_AUTOLOAD:-0}"
      SNOWLUMA_UPDATE_CHECK: "${SNOWLUMA_UPDATE_CHECK:-0}"
    volumes:
      - ./data/snowluma-config:/snowluma/config
      - ./data/snowluma-data:/snowluma/data
      - ./data/snowluma-logs:/snowluma/logs
      - ./docker/local-acceptance/snowluma-entrypoint.sh:/usr/local/bin/snowluma-entrypoint.sh:ro
    ports:
      - "127.0.0.1:5099:5099"
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5099/').then(() => process.exit(0)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  lethebot:
    image: lethebot/lethebot-local-acceptance:latest
    user: "${LETHEBOT_UID:-1000}:${LETHEBOT_GID:-1000}"
    build:
      context: .
      dockerfile: docker/local-acceptance/lethebot.Dockerfile
    depends_on:
      - snowluma
    environment:
      NODE_ENV: "production"
      LOG_LEVEL: "info"
      LETHEBOT_TEST: "false"
      LETHEBOT_BACKGROUND_SUMMARY_ENABLED: "${LETHEBOT_BACKGROUND_SUMMARY_ENABLED:-false}"
      LETHEBOT_DB_PATH: "/app/data/lethebot-local-acceptance.db"
      PI_PROVIDER: "mock"
      PI_MODEL: "mock"
      ONEBOT_TRANSPORT: "ws"
      ONEBOT_WS_URL: "ws://snowluma:3001/"
      ONEBOT_HTTP_URL: "http://snowluma:3000"
      ONEBOT_TOKEN: "${ONEBOT_TOKEN:-lethebot-local-token}"
      LETHEBOT_BOT_QQ_ID: "${LETHEBOT_BOT_QQ_ID:-}"
      LETHEBOT_PORT: "6700"
      LETHEBOT_HOST: "0.0.0.0"
      LETHEBOT_HEALTH_PATH: "/healthz"
      LETHEBOT_EVENT_PATH: "/onebot/event"
    volumes:
      - type: bind
        source: ./data/lethebot
        target: /app/data
        bind:
          create_host_path: false
    ports:
      - "127.0.0.1:6700:6700"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:6700/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
